<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
        <meta name="color-scheme" content="dark">
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Puppies or something.</title>
        <link rel="stylesheet" href="./css/style.css">
	</head>
	<body>
        <div class="ui">
            <a href="./changelog">Changelog</a>
        </div>
        <div class="heading">
            <img id="fire-text" src="./assets/puppieslogo.gif">
        </div>
        <h1 style="color: lime; margin-bottom: 0px;">Click the Puppy</h1>
        <h2 style="color: green; margin-top: 0px;">(I dare you)</h2>
        <div class="image-container">
            <img id="puppy-image" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Golde33443.jpg/250px-Golde33443.jpg" width="300" height="300">
        </div>
        <h1 style="color: lime;">Arfs: <span id="currency">0</span></h1>
        <div>
            <button id="reset-progress-button">Reset Progress</button>
            <div id="confirm-dialog">
                <p>
                    Are you sure you want to delete all progress?
                    <br>
                    (This action cannot be undone.)
                </p>
                <div class="buttons">
                    <button id="confirm-button">Confirm</button>
                    <button id="cancel-button">Cancel</button>
                </div>
            </div>
        </div>
        <script src="./src/main_page.js"></script>
	</body>
</html>
